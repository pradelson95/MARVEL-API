<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marvel Heroes</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background: radial-gradient(circle at top,#111827,#020617);
}

.hero-card{
transition: transform .3s, box-shadow .3s;
}

.hero-card:hover{
transform: translateY(-8px) scale(1.03);
box-shadow:0 20px 40px rgba(0,0,0,.6);
}

.fade-in{
animation:fade .6s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body class="text-white min-h-screen">

<header class="text-center py-10">

<h1 class="text-4xl font-bold tracking-widest text-red-500">
MARVEL HEROES
</h1>

<p class="text-gray-400 mt-2">
Marvel API Explorer
</p>

</header>


<!-- LOGIN -->
<section id="login-section" class="max-w-md mx-auto mb-10 px-6">

<div class="bg-gray-900 border border-gray-700 p-6 rounded-lg">

<h2 class="text-xl mb-4 text-center text-red-500">
Admin Login
</h2>

<input
id="username"
type="text"
placeholder="Usuario"
class="w-full p-3 mb-3 rounded bg-gray-800 border border-gray-700"
/>

<input
id="password"
type="password"
placeholder="Password"
class="w-full p-3 mb-3 rounded bg-gray-800 border border-gray-700"
/>

<button
id="login-btn"
onclick="login()"
class="w-full bg-red-600 hover:bg-red-700 p-3 rounded font-bold flex items-center justify-center gap-2"
>

<span id="login-text">Login</span>

<svg id="login-spinner"
class="hidden animate-spin h-5 w-5 text-white"
xmlns="http://www.w3.org/2000/svg"
fill="none"
viewBox="0 0 24 24">

<circle
class="opacity-25"
cx="12"
cy="12"
r="10"
stroke="currentColor"
stroke-width="4"></circle>

<path
class="opacity-75"
fill="currentColor"
d="M4 12a8 8 0 018-8v4l3-3-3-3v4a10 10 0 00-10 10h4z">
</path>

</svg>

</button>

</div>

</section>


<!-- APP -->
<div id="app" class="hidden">


<!-- PANEL ADMIN -->
<section id="admin-panel" class="hidden max-w-3xl mx-auto mb-12 px-6">

<div class="bg-gray-900 border border-gray-700 p-6 rounded-lg">

<h2 class="text-2xl text-red-500 mb-4">
Crear nuevo héroe
</h2>

<input id="name" placeholder="Hero name"
class="w-full p-3 mb-2 bg-gray-800 border border-gray-700 rounded"/>

<input id="real_name" placeholder="Real name"
class="w-full p-3 mb-2 bg-gray-800 border border-gray-700 rounded"/>

<input id="team" placeholder="Team"
class="w-full p-3 mb-2 bg-gray-800 border border-gray-700 rounded"/>

<input id="power_level" placeholder="Power level"
class="w-full p-3 mb-2 bg-gray-800 border border-gray-700 rounded"/>

<input id="image_url" placeholder="Image URL"
class="w-full p-3 mb-4 bg-gray-800 border border-gray-700 rounded"/>

<button
onclick="createHero()"
class="bg-green-600 hover:bg-green-700 p-3 rounded w-full font-bold"
>
Crear héroe
</button>

</div>

</section>


<!-- BUSCADOR -->
<section class="max-w-3xl mx-auto px-6 mb-10">

<input
id="search"
type="text"
placeholder="Buscar héroe o nombre real..."
class="w-full p-4 rounded-lg bg-gray-900 border border-gray-700"
/>

</section>


<!-- HEROES -->
<section
id="heroes-container"
class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 px-10 pb-20"
>
</section>

</div>


<!-- TOAST -->
<div id="toast"
class="fixed top-6 right-6 hidden px-6 py-3 rounded-lg shadow-lg text-white">
</div>


<script src="index.js"></script>

</body>
</html>
